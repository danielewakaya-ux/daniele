<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Disciplinas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5edff;
      margin: 0;
      text-align: center;
    }

    header {
      background: #9333ea;
      color: white;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #e9d5ff;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #9333ea;
      color: white;
      transform: scale(1.05);
    }

    .area {
      margin: 20px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      border: 2px solid #d8b4fe;
    }

    textarea {
      width: 90%;
      height: 150px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 10px;
      font-size: 14px;
      resize: none;
    }

    .salvar {
      margin-top: 10px;
      background: #9333ea;
      color: white;
    }
  </style>
</head>
<body>

<header>📚 Meu Painel de Estudos</header>

<div class="container">
  <button onclick="abrir('matematica')">Matemática</button>
  <button onclick="abrir('portugues')">Português</button>
  <button onclick="abrir('historia')">História</button>
  <button onclick="abrir('geografia')">Geografia</button>
  <button onclick="abrir('ciencias')">Ciências</button>
  <button onclick="abrir('poo')">POO / Java</button>
  <button onclick="abrir('arquitetura')">Arquitetura e Manutenção</button>
  <button onclick="abrir('web')">Programação Web</button>
</div>

<div class="area">
  <h2 id="titulo">Selecione uma matéria</h2>
  <textarea id="texto" placeholder="Escreva aqui suas anotações..."></textarea><br>
  <button class="salvar" onclick="salvar()">Salvar</button>
</div>

<script>
  let materiaAtual = '';

  function abrir(materia) {
    materiaAtual = materia;
    document.getElementById('titulo').innerText = materia.toUpperCase();

    const conteudoSalvo = localStorage.getItem(materia);
    document.getElementById('texto').value = conteudoSalvo || '';
  }

  function salvar() {
    if (!materiaAtual) {
      alert('Escolha uma matéria primeiro!');
      return;
    }

    const texto = document.getElementById('texto').value;
    localStorage.setItem(materiaAtual, texto);
    alert('Conteúdo salvo!');
  }
</script>

</body>
</html>
